<?xml version="1.0" encoding="UTF-8"?>
<!-- Monogramme « A » Alta Assurances, recoloré en bleu marine pour fonds clairs -->
<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Alta Assurances">
  <!-- Jambe droite : diagonale franche de l'apex vers le bas-droite -->
  <path d="M60 14 L92 90" stroke="#12223A" stroke-width="11" stroke-linecap="round"/>
  <!-- Jambe gauche : courbe « swoosh » caractéristique de l'apex vers le bas-gauche -->
  <path d="M60 14 C 40 38, 20 64, 9 90" stroke="#12223A" stroke-width="11" stroke-linecap="round"/>
  <!-- Pied courbe qui relève vers la gauche -->
  <path d="M9 90 C 9 74, 22 66, 40 67" stroke="#12223A" stroke-width="11" stroke-linecap="round"/>
</svg>
